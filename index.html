<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peripheral Encyclopedia</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Three.js for 3D Rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- Base64 Encoded 3D Models (Bypasses CORS for local viewing) -->
    <script src="models/mouse_model.js"></script>
    <script src="models/joystick_model.js"></script>
</head>
<body>
    <!-- Main Top Header -->
    <header class="main-header">
        <div class="logo">Peripheral Encyclopedia</div>
        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <div class="container">
        <!-- Left Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <h2 class="sidebar-title">Devices</h2>
            <ul class="device-list" id="device-list">
                <!-- Device links will be dynamically populated here -->
            </ul>
        </nav>

        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Sidebar">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="sidebar-arrow">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>

        <!-- Main Content Area -->
        <main class="main-content">
            <article id="content-area">
                <div class="welcome-screen">
                    <h1 class="welcome-title">Welcome to the Peripheral Encyclopedia</h1>
                    <p class="welcome-subtitle">Select a device from the sidebar to explore.</p>
                </div>
            </article>
        </main>

        <!-- Right Table of Contents Sidebar -->
        <aside class="toc-sidebar" id="toc-sidebar" style="display: none;">
            <h3>On this page</h3>
            <ul class="toc-list" id="toc-list">
                <!-- TOC links will be dynamically populated here -->
            </ul>
        </aside>
    </div>

    <script src="data.js"></script>
    <script src="data/printer.js"></script>
    <script src="data/external-ssd.js"></script>
    <script src="data/joystick.js"></script>
    <script src="script.js"></script>
</body>
</html>
